name: CI

# Gates that Vercel's build does NOT run: type-checking, unit tests, lint, and the security-invariant
# guards. The production build itself runs on Vercel's preview/production deploys. Type errors that
# would break `next build` are caught here by `tsc` without needing build secrets.

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck · Lint · Test · Guards
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # Same type-check `next build` runs — catches deploy-blocking type errors early, no secrets needed.
      - name: Typecheck
        run: npx tsc --noEmit

      # Fail only on lint errors, not the existing `no-explicit-any` warnings.
      - name: Lint (errors only)
        run: npx eslint . --quiet

      # Live-eval tests self-skip when ANTHROPIC_API_KEY / Supabase env are absent (as in CI).
      - name: Unit tests
        run: npm run test:ci

      # Regression guards for the audited security fixes (F9 / F11 / F14). See docs/audit-findings.md.
      - name: Security invariant guards
        run: node scripts/ci/check-security-invariants.mjs
