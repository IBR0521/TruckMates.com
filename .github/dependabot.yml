version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "security"
    groups:
      root-npm-updates:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/truckmates-eld-mobile"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:15"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "security"
    groups:
      mobile-npm-updates:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
